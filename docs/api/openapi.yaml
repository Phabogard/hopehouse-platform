openapi: 3.1.0
info:
  title: Hope House ERP API
  version: 0.1.0
  description: Contrat API initial du MVP Hope House ERP.
x-targetArchitecture:
  summary: Architecture cible documentaire validée avant implémentation.
  principles:
    - Moteur universel de commandes configurables.
    - Cycle commun: création, validation, exécution, notification, reçu, historique, audit.
    - Catalogues, rôles, permissions, prix, commissions, modes et connecteurs administrables sans recompilation.
    - Portefeuilles multi-devise USD/CDF pour agents et clients.
    - Connecteurs indépendants de la logique métier.
  futureDocumentaryResources:
    - /orders
    - /catalogs
    - /wallets
    - /notifications
    - /receipts
    - /connectors
paths:
  /health:
    get:
      summary: Vérifie l'état de l'API.
      responses:
        '200':
          description: API opérationnelle.
  /users:
    get:
      summary: Liste les utilisateurs.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Liste des utilisateurs.
  /beneficiaries:
    get:
      summary: Liste les bénéficiaires.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Liste des bénéficiaires.
    post:
      summary: Crée un bénéficiaire.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateBeneficiaryRequest'
      responses:
        '201':
          description: Bénéficiaire créé.
  /services:
    get:
      summary: Liste les services.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Liste des services.
  /subscriptions:
    get:
      summary: Liste les abonnements.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Liste des abonnements.
  /payments:
    get:
      summary: Liste les paiements.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Liste des paiements.
    post:
      summary: Crée un paiement.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePaymentRequest'
      responses:
        '201':
          description: Paiement créé.
  /invoices:
    get:
      summary: Liste les factures.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Liste des factures.
  /audit-logs:
    get:
      summary: Liste les traces d'audit.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Liste des traces d'audit.
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    CreateBeneficiaryRequest:
      type: object
      required:
        - reference
        - displayName
      properties:
        reference:
          type: string
          minLength: 2
        displayName:
          type: string
          minLength: 2
    CreatePaymentRequest:
      type: object
      required:
        - beneficiaryId
        - amountCents
        - currency
      properties:
        beneficiaryId:
          type: string
          minLength: 1
        amountCents:
          type: integer
          minimum: 0
        currency:
          type: string
          minLength: 3
          maxLength: 3
        paymentMethod:
          type:
            - string
            - 'null'
